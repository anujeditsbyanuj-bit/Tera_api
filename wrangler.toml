name = "tera-api"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# ── Environment variables / secrets ──────────────────────────────────────
# Set these in Cloudflare Dashboard → Workers & Pages → your worker →
# Settings → Variables and Secrets (NOT here — never commit real cookies
# to GitHub). All of them are optional except recommended NDUS:
#
#   NDUS            → your Terabox "ndus" cookie value (recommended)
#   CSRF_TOKEN       → your Terabox "csrfToken" cookie value (optional)
#   BROWSER_ID       → your Terabox "browserid" cookie value (optional)
#   TSID             → your Terabox "TSID" cookie value (optional)
#   NDUT_FMT         → your Terabox "ndut_fmt" cookie value (optional)
#   RATE_LIMIT       → requests per IP per window (default 30, 0 = disabled)
#   RATE_WINDOW      → rate-limit window in seconds (default 60)
#   CACHE_MAX_SIZE   → max cached resolved-links entries (default 500)
